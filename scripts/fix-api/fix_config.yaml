# cTrader FIX 4.4 API Configuration
# AlgoDesk Trading Desk

price_connection:
  host: live-uk-eqx-01.p.c-trader.com
  port: 5211
  sender_comp_id: live4.icmarkets.6003600
  target_comp_id: cServer
  sender_sub_id: QUOTE

trade_connection:
  host: live-uk-eqx-01.p.c-trader.com
  port: 5212
  sender_comp_id: live4.icmarkets.6003600
  target_comp_id: cServer
  sender_sub_id: TRADE

# Password via FIX_PASSWORD environment variable

# Default symbols to subscribe on startup (cTrader symbol IDs)
default_symbols:
  - "1"    # EURUSD
  - "2"    # GBPUSD

# Heartbeat interval in seconds
heartbeat_interval: 30

# Reconnect settings
reconnect_delay: 5.0
max_reconnect_delay: 60.0

# Pre-trade risk limits
risk_limits:
  # Per-order limits
  max_order_size: 10.0              # Max lots per single order
  min_order_size: 0.01              # Min lots per single order

  # Per-symbol limits
  max_position_size: 50.0           # Max net lots per symbol
  max_open_orders_per_symbol: 10    # Max open orders per symbol

  # Portfolio-level limits
  max_open_orders: 50               # Max total concurrent open orders
  max_daily_orders: 500             # Max orders per trading day
  max_total_exposure: 100.0         # Max total lots across all symbols

  # Drawdown circuit breaker
  max_daily_loss: 5000.0            # Max daily loss in account currency (triggers kill switch)
  max_drawdown_pct: 5.0             # Max drawdown as % of starting equity (triggers kill switch)

  # Rate limiting
  max_orders_per_minute: 30         # Burst limit per minute
  max_orders_per_second: 5          # Micro-burst limit per second

  # Duplicate / sanity checks
  duplicate_window_sec: 2.0         # Reject identical orders within this window
  max_spread_pips: 50.0             # Reject if spread exceeds threshold
  stale_price_sec: 30.0             # Reject if last price update older than this

# REST API server
api:
  host: 0.0.0.0
  port: 5200
